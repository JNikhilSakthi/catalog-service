spring:
  application:
    name: catalog-service

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:catalog_db}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME:catalog_user}
    password: ${DB_PASSWORD:catalog_pass}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: catalog-hikari
      maximum-pool-size: 10
      minimum-idle: 2

  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: false
        jdbc:
          time_zone: UTC

  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  cache:
    type: caffeine

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,caches,metrics
  endpoint:
    health:
      show-details: when-authorized
  health:
    defaults:
      enabled: true

# Caffeine cache tuning -- see com.medha.catalogservice.config.CacheProperties
catalog:
  cache:
    simulated-repository-latency-ms: ${SIMULATED_LATENCY_MS:250}
    products:
      maximum-size: 500
      expire-after-write: 10m
    product-lists:
      maximum-size: 200
      expire-after-write: 5m
    product-search:
      maximum-size: 100
      expire-after-write: 2m
    categories:
      maximum-size: 100
      expire-after-access: 30m

logging:
  level:
    root: INFO
    com.medha.catalogservice: DEBUG
    org.springframework.cache: DEBUG
